<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-lg rounded-lg p-6 w-full max-w-md">

        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">
            Calorie Counter
        </h1>
      

        <form id="foodForm" class="space-y-4">

            <div>
                <label for="foodName" class="block font-medium text-gray-700 mb-1">
                    Food Name
                </label>
                <input
                    type="text"
                    id="foodName"
                    name="food-name"
                    required
                    class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-green-500"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition"
            >
                Add Food
            </button>

        </form>
        <div id="manualCaloriesBox" class="mt-3 hidden">
        <p class="text-red-500 font-semibold" id="notFoundMsg"></p>

          <input
             type="number"
             id="manualCaloriesInput"
             placeholder="Enter calories manually"
             class="border p-2 mt-2 w-full"
         />
         <button id="saveCaloriesBtn" class="bg-green-500 text-white px-3 py-1 rounded w-full">
            Save
        </button>
        </div>

        <div class="mt-6">
            <h2 class="text-xl font-semibold mb-3 text-gray-800">
                Today's Food Items
            </h2>

            <ul id="foodList" class="space-y-2">
            </ul>
        </div>

        <div class="mt-6 text-center">
            <h2 class="text-xl font-bold text-gray-800">
                Total Calories:
                <span id="totalCalories" class="text-green-600">
                    0
                </span>
            </h2>
        </div>

        <button
            id="resetBtn"
            class="w-full mt-4 bg-red-500 text-white py-2 rounded-md hover:bg-red-600 transition"
        >
            Reset
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
