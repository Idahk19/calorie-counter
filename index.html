<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Counter</title>
</head>
<body>
    <div>
        <h1> Calorie Counter</h1>

        <form action="" id="foodForm">
            <div>
                <label for="food-name">Food Name</label>
                <input type="text" name="food-name" id="foodName" required>
            </div>
            <div>
                <label for="food-calories">Calories</label>
                <input type="text" name="food-calories" id="foodCalories" required>
            </div>

            <button type="submit">Add Food</button>
        </form>


        <div>
            <h2>Today's Food Items</h2>
            <ul id="foodList">

            </ul>
        </div>
        <!-- TOTAL CALORIES DISPLAY -->
        <div class="mt-4 text-center">
            <h2 class="text-xl font-bold">
            Total Calories:
            <span id="totalCalories">0</span>
            </h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
